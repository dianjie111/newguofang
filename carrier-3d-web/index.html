<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D航母作战系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="container">
        <div id="canvas-container"></div>
        <div id="control-panel">
            <h2>航母作战系统</h2>
            
            <div class="control-group">
                <label>航母状态</label>
                <button onclick="changeStatus('normal')">正常状态</button>
                <button onclick="changeStatus('alert')">警戒状态</button>
                <button onclick="changeStatus('combat')">战斗状态</button>
            </div>
            
            <div class="control-group">
                <label>舰载机控制</label>
                <button onclick="toggleAircraft('show')">显示舰载机</button>
                <button onclick="toggleAircraft('hide')">隐藏舰载机</button>
                <button onclick="launchAircraft()">起飞舰载机</button>
                <button onclick="recoverAircraft()">回收舰载机</button>
            </div>
            
            <div class="control-group">
                <label>武器系统</label>
                <button onclick="fireMissile()">发射导弹</button>
                <button onclick="toggleCIWS()">近防系统</button>
                <button onclick="activateECM()">电子对抗</button>
            </div>
            
            <div class="control-group">
                <label>雷达系统</label>
                <button onclick="toggleRadar('start')">启动雷达</button>
                <button onclick="toggleRadar('stop')">停止雷达</button>
                <button onclick="toggleSonar()">声呐系统</button>
            </div>
            
            <div class="control-group">
                <label>编队控制</label>
                <button onclick="formFormation('wedge')">楔形编队</button>
                <button onclick="formFormation('line')">线性编队</button>
                <button onclick="formFormation('circle')">环形编队</button>
            </div>
        </div>
    </div>

    <script src="lib/three.min.js"></script>
    <script src="lib/OrbitControls.js"></script>
    <script src="lib/GLTFLoader.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
